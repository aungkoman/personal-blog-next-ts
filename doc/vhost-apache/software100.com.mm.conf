<VirtualHost *:80>
    ServerName software100.com.mm
    ServerAlias www.software100.com.mm
    
    ServerAdmin hello@software100.com.mm
    DocumentRoot /home/crm/frontend/personal-blog-next-ts/public
    
    # Reverse Proxy to Next.js on port 3000
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/
    
    # Preserve original host and X-Forwarded headers
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/software100.error.log
    CustomLog ${APACHE_LOG_DIR}/software100.access.log combined
    
    # Security
    <Directory /home/crm/frontend/personal-blog-next-ts/public>
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>